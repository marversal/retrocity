<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Space Shooter</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #050510;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="500" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Variables
        let score = 0;
        let gameOver = false;
        let player, bullets, enemies, stars;

        // --- Player Class ---
        class Player {
            constructor() {
                this.width = 50;
                this.height = 40;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - this.height - 20;
                this.speed = 6;
                this.dx = 0;
            }

            draw() {
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.closePath();
                ctx.fill();
            }

            move() {
                this.x += this.dx;
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
            }

            shoot() {
                bullets.push(new Bullet(this.x + this.width / 2 - 2.5, this.y));
            }
        }

        // --- Bullet Class ---
        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 5;
                this.height = 15;
                this.speed = 8;
            }

            draw() {
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.y -= this.speed;
            }
        }

        // --- Enemy Class ---
        class Enemy {
            constructor() {
                this.width = 40;
                this.height = 30;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = 2.5;
            }

            draw() {
                ctx.fillStyle = '#ffcc00';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Draw a simple retro alien top
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 10, this.y + 10, 5, 5);
                ctx.fillRect(this.x + 25, this.y + 10, 5, 5);
            }

            update() {
                this.y += this.speed;
            }
        }

        // --- Star Class (Background) ---
        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 2 + 0.5;
            }

            draw() {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }

            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = 0;
                    this.x = Math.random() * canvas.width;
                }
            }
        }

        // --- Game Logic Functions ---
        function init() {
            player = new Player();
            bullets = [];
            enemies = [];
            stars = [];
            score = 0;
            gameOver = false;
            
            for (let i = 0; i < 100; i++) {
                stars.push(new Star());
            }
        }

        function handleInput() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a') player.dx = -player.speed;
                if (e.key === 'ArrowRight' || e.key === 'd') player.dx = player.speed;
                if (e.key === ' ' || e.key === 'Spacebar') {
                    if (!gameOver) player.shoot();
                }
                if (gameOver && (e.key === 'r' || e.key === 'R')) init();
            });

            window.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') {
                    player.dx = 0;
                }
            });
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (gameOver) return;

            // Update Background
            stars.forEach(star => star.update());

            // Update Player
            player.move();

            // Update Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // Spawn Enemies
            if (Math.random() < 0.02) {
                enemies.push(new Enemy());
            }

            // Update Enemies & Collisions
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();

                // Player vs Enemy Collision
                if (checkCollision(player, enemies[i])) {
                    gameOver = true;
                }

                // Remove enemy if it reaches bottom
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    continue;
                }

                // Bullet vs Enemy Collision
                for (let b = bullets.length - 1; b >= 0; b--) {
                    if (checkCollision(bullets[b], enemies[i])) {
                        enemies.splice(i, 1);
                        bullets.splice(b, 1);
                        score += 10;
                        break;
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Background
            stars.forEach(star => star.draw());

            // Draw Player
            player.draw();

            // Draw Bullets
            bullets.forEach(bullet => bullet.draw());

            // Draw Enemies
            enemies.forEach(enemy => enemy.draw());

            // Draw Score
            ctx.fillStyle = '#fff';
            ctx.font = '20px Courier New';
            ctx.fillText(`SCORE: ${score}`, 20, 30);

            // Draw Game Over Screen
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff0055';
                ctx.font = '40px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = '#fff';
                ctx.font = '20px Courier New';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('PRESS R TO RESTART', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        init();
        handleInput();
        gameLoop();
    </script>
</body>
</html>
